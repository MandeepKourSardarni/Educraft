
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduCraft Activity Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  background:#fff8ec;
  color:#2b2b3a;
}

.hero{
  min-height:360px;
  background-image:url("image.png");
  background-size:cover;
  background-position:top center;
  background-repeat:no-repeat;
  padding:45px 18px 25px;
  text-align:center;
}

h1{
  font-family:'Fredoka One',cursive;
  font-size:42px;
  margin:0 0 8px;
  color:#4b6fe8;
  font-weight:400;
}

.hero p{
  margin:5px 0;
  font-size:15px;
  color:#555;
  font-weight:400;
}

.main{
  max-width:1100px;
  margin:-70px auto 0;
  padding:0 18px 35px;
}

.panel{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.8);
  border-radius:22px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 8px 28px rgba(0,0,0,.08);
}

.label{
  display:block;
  font-family:'Fredoka One',cursive;
  font-size:18px;
  margin-bottom:14px;
  color:#3c3c5c;
  font-weight:400;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:10px;
}

button{
  border-radius:16px;
  border:2px solid #eee;
  background:white;
  color:#333;
  padding:14px 10px;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  font-size:14px;
  font-weight:500;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

button.selected{
  border-color:#ff8fc7;
  background:#fff0f8;
  box-shadow:0 0 16px rgba(255,143,199,.45);
}

.generate{
  display:block;
  margin:24px auto;
  padding:16px 42px;
  border:none;
  border-radius:50px;
  font-family:'Fredoka One',cursive;
  font-size:18px;
  font-weight:400;
  color:white;
  background:linear-gradient(135deg,#667eea,#f093fb,#54a0ff);
  box-shadow:0 10px 28px rgba(102,126,234,.35);
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  gap:18px;
  margin-top:24px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  border:1px solid #f1f1f1;
  border-top:4px solid #54a0ff;
  box-shadow:0 8px 26px rgba(0,0,0,.08);
}

.card h3{
  font-family:'Fredoka One',cursive;
  font-size:18px;
  font-weight:400;
  margin:8px 0;
  color:#33395c;
}

.card p{
  font-size:14px;
  line-height:1.55;
  font-weight:400;
  color:#555;
}

.tag{
  display:inline-block;
  background:#eef4ff;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  margin:4px;
  font-weight:500;
  color:#3c5fb8;
}

.print{
  width:100%;
  margin-top:14px;
  border:none;
  color:white;
  background:linear-gradient(135deg,#54a0ff,#667eea);
}

.footer{
  text-align:center;
  padding:25px;
  font-size:12px;
  color:#888;
}

/* Tablets */
@media(max-width:900px){
  .hero{
    min-height:330px;
    background-size:cover;
  }

  .main{
    margin:-55px auto 0;
  }

  h1{
    font-size:36px;
  }
}

/* Phones vertical */
@media(max-width:600px){
  .hero{
    min-height:280px;
    background-size:cover;
    background-position:top center;
    padding-top:34px;
  }

  h1{
    font-size:30px;
  }

  .hero p{
    font-size:13px;
  }

  .main{
    margin:-35px auto 0;
    padding:0 12px 28px;
  }

  .panel{
    padding:18px;
    border-radius:18px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .generate{
    width:100%;
    padding:15px 20px;
  }
}

/* Phones horizontal */
@media(max-height:500px) and (orientation:landscape){
  .hero{
    min-height:240px;
    background-size:cover;
    padding-top:25px;
  }

  h1{
    font-size:30px;
  }

  .main{
    margin:-40px auto 0;
  }
}
</style>
</head>

<body>

<section class="hero">
</section>

<main class="main">

  <div class="panel">
    <span class="label">🏫 Step 1 — School Type</span>
    <div class="grid" id="schools"></div>
  </div>

  <div class="panel">
    <span class="label">📚 Step 2 — Grade Level</span>
    <div class="grid" id="grades"></div>
  </div>

  <div class="panel">
    <span class="label">📅 Step 3 — Month</span>
    <div class="grid" id="months"></div>
  </div>

  <button class="generate" onclick="generateActivities()">✨ Generate Activities</button>

  <div id="results"></div>

</main>

<div class="footer">
  EduCraft Activity Hub · Canadian Academic Year 🍁
</div>

<script>
const schools = ["Public 🏫", "Private 🎓", "Catholic ✝️"];

const grades = [
  "JK 🌱", "SK 🌼", "Grade 1 ⭐", "Grade 2 🌟", "Grade 3 🎯",
  "Grade 4 🚀", "Grade 5 🔬", "Grade 6 🎨", "Grade 7 💡", "Grade 8 🏆"
];

const months = [
  "September 🍂", "October 🎃", "November 🍁", "December ❄️",
  "January ☃️", "February 💝", "March 🌬️", "April 🌧️",
  "May 🌸", "June ☀️"
];

let selectedSchool = "";
let selectedGrade = "";
let selectedMonth = "";

function makeButtons(list, containerId, type){
  const container = document.getElementById(containerId);

  list.forEach(item=>{
    const btn = document.createElement("button");
    btn.innerHTML = item;

    btn.onclick = () => {
      [...container.children].forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");

      if(type==="school") selectedSchool = item;
      if(type==="grade") selectedGrade = item;
      if(type==="month") selectedMonth = item;
    };

    container.appendChild(btn);
  });
}

makeButtons(schools, "schools", "school");
makeButtons(grades, "grades", "grade");
makeButtons(months, "months", "month");

const activityBank = [
  {
    emoji:"🌸",
    title:"Mother’s Day Kindness Flower",
    subject:"Art / Language",
    desc:"Children make a colourful paper flower and write one kind sentence on each petal. They learn gratitude, writing, and emotional expression.",
    materials:["paper", "crayons", "scissors", "glue"]
  },
  {
    emoji:"☀️",
    title:"Summer Safety Poster",
    subject:"Health",
    desc:"Children create a poster showing sunscreen, water, hats, and safe outdoor play. They learn how to stay safe in summer.",
    materials:["chart paper", "markers", "stickers"]
  },
  {
    emoji:"🐝",
    title:"Pollinator Garden Craft",
    subject:"Science",
    desc:"Children create bees, butterflies, and flowers using paper cutouts. They learn how pollinators help plants grow.",
    materials:["construction paper", "glue", "pipe cleaners"]
  },
  {
    emoji:"🍁",
    title:"Canadian Nature Collage",
    subject:"Social Studies / Art",
    desc:"Children make a collage of Canadian animals, trees, lakes, and seasons. They learn about Canada’s natural environment.",
    materials:["magazines", "paper", "glue", "markers"]
  },
  {
    emoji:"📏",
    title:"Build-a-Shape City",
    subject:"Math",
    desc:"Children use squares, rectangles, triangles, and circles to build a paper city. They learn shapes, counting, and spatial thinking.",
    materials:["shape cutouts", "glue", "large paper"]
  },
  {
    emoji:"🪶",
    title:"Respectful Indigenous Pattern Art",
    subject:"Art / Social Studies",
    desc:"Children explore simple nature-inspired patterns and create their own artwork respectfully. They learn that Indigenous cultures have deep connections to land and storytelling.",
    materials:["paper", "crayons", "pattern examples"]
  }
];

function generateActivities(){
  if(!selectedSchool || !selectedGrade || !selectedMonth){
    alert("Please select school type, grade, and month first.");
    return;
  }

  const shuffled = [...activityBank].sort(() => Math.random() - 0.5);

  document.getElementById("results").innerHTML = `
    <h2 style="text-align:center;font-family:'Fredoka One',cursive;font-weight:400;color:#3c3c5c;">
      🎉 ${selectedGrade} · ${selectedMonth} · ${selectedSchool}
    </h2>

    <div class="cards">
      ${shuffled.map(a=>`
        <div class="card">
          <div style="font-size:40px">${a.emoji}</div>
          <span class="tag">${a.subject}</span>
          <h3>${a.title}</h3>
          <p>${a.desc}</p>

          <div>
            ${a.materials.map(m=>`<span class="tag">✓ ${m}</span>`).join("")}
          </div>

          <button class="print" onclick="printActivity('${a.title}', '${a.subject}', '${a.desc}')">
            🖨️ Print Activity
          </button>
        </div>
      `).join("")}
    </div>
  `;
}

function printActivity(title, subject, desc){
  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <head>
      <title>${title}</title>
      <style>
        body{
          font-family:Arial, sans-serif;
          padding:30px;
          max-width:750px;
          margin:auto;
          color:#222;
        }

        h1{
          color:#302b63;
          font-weight:500;
        }

        h3{
          font-weight:500;
        }

        p, li{
          font-weight:400;
          line-height:1.5;
        }

        .box{
          border:2px solid #ddd;
          padding:18px;
          border-radius:12px;
          margin:16px 0;
        }

        button{
          padding:12px 24px;
          border:none;
          border-radius:20px;
          background:#302b63;
          color:white;
          font-weight:500;
        }

        @media print{
          button{display:none}
        }
      </style>
    </head>

    <body>
      <button onclick="window.print()">Print / Save as PDF</button>

      <h1>${title}</h1>
      <h3>${subject}</h3>

      <div class="box">
        <h3>Learning Goal</h3>
        <p>${desc}</p>
      </div>

      <div class="box">
        <h3>Steps</h3>
        <ol>
          <li>Teacher explains the activity.</li>
          <li>Children collect the materials.</li>
          <li>Children cut, colour, paste, and decorate.</li>
          <li>Children share their work with the group.</li>
          <li>Teacher connects the activity to learning.</li>
        </ol>
      </div>

      <div class="box">
        <h3>Extension</h3>
        <p>Ask children to explain one thing they learned from the activity.</p>
      </div>
    </body>
    </html>
  `);

  win.document.close();
}
</script>

</body>
</html>
