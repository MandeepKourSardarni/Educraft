<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCraft Activity Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:'Nunito',sans-serif;
      background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e,#12002e,#0d1b4b);
      background-size:400% 400%;
      animation:bgShift 18s ease infinite;
      padding:24px 18px;
      color:white;
    }

    @keyframes bgShift{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }

    @keyframes floatY{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .header{text-align:center;margin-bottom:32px}

    .logo{
      font-size:58px;
      animation:floatY 3s ease-in-out infinite;
      margin-bottom:8px;
    }

    h1{
      font-family:'Fredoka One',cursive;
      font-size:38px;
      margin:0 0 6px;
      background:linear-gradient(135deg,#54a0ff,#ff6b9d,#ffd32a,#0be881);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .panel{
      background:rgba(255,255,255,0.07);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:20px;
      padding:22px 24px;
      margin-bottom:18px;
      box-shadow:0 8px 40px rgba(0,0,0,.3);
    }

    .label{
      font-family:'Fredoka One',cursive;
      font-size:17px;
      margin-bottom:14px;
      display:block;
      font-weight:400;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
      gap:10px;
    }

    button{
      border-radius:16px;
      border:2px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      color:white;
      padding:14px 10px;
      cursor:pointer;
      font-family:'Nunito',sans-serif;
      font-weight:500;
      transition:.2s;
    }

    button:hover{
      transform:translateY(-3px) scale(1.03);
    }

    button.selected{
      border-color:#ff6b9d;
      background:linear-gradient(135deg,#ff6b9d44,#54a0ff66);
      box-shadow:0 0 20px #ff6b9d77;
    }

    .generate{
      display:block;
      margin:26px auto;
      padding:17px 52px;
      border-radius:60px;
      border:none;
      font-size:18px;
      font-family:'Fredoka One',cursive;
      font-weight:400;
      background:linear-gradient(135deg,#667eea,#f093fb,#54a0ff);
      box-shadow:0 10px 40px rgba(102,126,234,.6);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:18px;
      margin-top:24px;
    }

    .card{
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(20px);
      border-radius:20px;
      padding:22px;
      border:1px solid rgba(255,255,255,.18);
      border-top:4px solid #54a0ff;
      box-shadow:0 8px 32px rgba(0,0,0,.2);
    }

    .card h3{
      font-family:'Fredoka One',cursive;
      font-weight:400;
      margin:8px 0;
      font-size:18px;
    }

    .card p{
      font-weight:400;
      line-height:1.55;
      color:rgba(255,255,255,.78);
    }

    .tag{
      display:inline-block;
      background:rgba(84,160,255,.25);
      padding:4px 10px;
      border-radius:20px;
      font-size:11px;
      margin:4px;
      font-weight:500;
    }

    .print{
      width:100%;
      margin-top:14px;
      background:linear-gradient(135deg,#54a0ff,#667eea);
      border:none;
      font-weight:500;
    }

    .footer{
      text-align:center;
      margin-top:32px;
      color:rgba(255,255,255,.35);
      font-size:12px;
      font-weight:400;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">🎨</div>
    <h1>EduCraft Activity Hub</h1>
    <p>🍁 Canadian K–8 Printable Activities for Educators</p>
    <p>Public · Private · Catholic Schools</p>
  </div>

  <div class="panel">
    <span class="label">🏫 Step 1 — School Type</span>
    <div class="grid" id="schools"></div>
  </div>

  <div class="panel">
    <span class="label">📚 Step 2 — Grade Level</span>
    <div class="grid" id="grades"></div>
  </div>

  <div class="panel">
    <span class="label">📅 Step 3 — Month</span>
    <div class="grid" id="months"></div>
  </div>

  <button class="generate" onclick="generateActivities()">✨ Generate Activities</button>

  <div id="results"></div>

  <div class="footer">
    EduCraft Activity Hub · Canadian Academic Year 🍁
  </div>

<script>
const schools = ["Public 🏫", "Private 🎓", "Catholic ✝️"];

const grades = [
  "JK 🌱", "SK 🌼", "Grade 1 ⭐", "Grade 2 🌟", "Grade 3 🎯",
  "Grade 4 🚀", "Grade 5 🔬", "Grade 6 🎨", "Grade 7 💡", "Grade 8 🏆"
];

const months = [
  "September 🍂", "October 🎃", "November 🍁", "December ❄️",
  "January ☃️", "February 💝", "March 🌬️", "April 🌧️",
  "May 🌸", "June ☀️"
];

let selectedSchool = "";
let selectedGrade = "";
let selectedMonth = "";

function makeButtons(list, containerId, type){
  const container = document.getElementById(containerId);

  list.forEach(item=>{
    const btn = document.createElement("button");
    btn.innerHTML = item;

    btn.onclick = () => {
      [...container.children].forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");

      if(type==="school") selectedSchool = item;
      if(type==="grade") selectedGrade = item;
      if(type==="month") selectedMonth = item;
    };

    container.appendChild(btn);
  });
}

makeButtons(schools, "schools", "school");
makeButtons(grades, "grades", "grade");
makeButtons(months, "months", "month");

const activityBank = [
  {
    emoji:"🌸",
    title:"Mother’s Day Kindness Flower",
    subject:"Art / Language",
    desc:"Children make a colourful paper flower and write one kind sentence on each petal. They learn gratitude, writing, and emotional expression.",
    materials:["paper", "crayons", "scissors", "glue"]
  },
  {
    emoji:"☀️",
    title:"Summer Safety Poster",
    subject:"Health",
    desc:"Children create a poster showing sunscreen, water, hats, and safe outdoor play. They learn how to stay safe in summer.",
    materials:["chart paper", "markers", "stickers"]
  },
  {
    emoji:"🐝",
    title:"Pollinator Garden Craft",
    subject:"Science",
    desc:"Children create bees, butterflies, and flowers using paper cutouts. They learn how pollinators help plants grow.",
    materials:["construction paper", "glue", "pipe cleaners"]
  },
  {
    emoji:"🍁",
    title:"Canadian Nature Collage",
    subject:"Social Studies / Art",
    desc:"Children make a collage of Canadian animals, trees, lakes, and seasons. They learn about Canada’s natural environment.",
    materials:["magazines", "paper", "glue", "markers"]
  },
  {
    emoji:"📏",
    title:"Build-a-Shape City",
    subject:"Math",
    desc:"Children use squares, rectangles, triangles, and circles to build a paper city. They learn shapes, counting, and spatial thinking.",
    materials:["shape cutouts", "glue", "large paper"]
  },
  {
    emoji:"🪶",
    title:"Respectful Indigenous Pattern Art",
    subject:"Art / Social Studies",
    desc:"Children explore simple nature-inspired patterns and create their own artwork respectfully. They learn that Indigenous cultures have deep connections to land and storytelling.",
    materials:["paper", "crayons", "pattern examples"]
  }
];

function generateActivities(){
  if(!selectedSchool || !selectedGrade || !selectedMonth){
    alert("Please select school type, grade, and month first.");
    return;
  }

  const shuffled = [...activityBank].sort(() => Math.random() - 0.5);

  document.getElementById("results").innerHTML = `
    <h2 style="text-align:center;font-family:'Fredoka One',cursive;font-weight:400;">
      🎉 ${selectedGrade} · ${selectedMonth} · ${selectedSchool}
    </h2>

    <div class="cards">
      ${shuffled.map(a=>`
        <div class="card">
          <div style="font-size:40px">${a.emoji}</div>
          <span class="tag">${a.subject}</span>
          <h3>${a.title}</h3>
          <p>${a.desc}</p>

          <div>
            ${a.materials.map(m=>`<span class="tag">✓ ${m}</span>`).join("")}
          </div>

          <button class="print" onclick="printActivity('${a.title}', '${a.subject}', '${a.desc}')">
            🖨️ Print Activity
          </button>
        </div>
      `).join("")}
    </div>
  `;
}

function printActivity(title, subject, desc){
  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <head>
      <title>${title}</title>
      <style>
        body{
          font-family:Arial;
          padding:30px;
          max-width:750px;
          margin:auto;
          font-weight:400;
        }
        h1{color:#302b63;font-weight:500}
        h3{font-weight:500}
        p, li{font-weight:400;line-height:1.5}
        .box{
          border:2px solid #ddd;
          padding:18px;
          border-radius:12px;
          margin:16px 0;
        }
        button{
          padding:12px 24px;
          border:none;
          border-radius:20px;
          background:#302b63;
          color:white;
          font-weight:500;
        }
        @media print{
          button{display:none}
        }
      </style>
    </head>
    <body>
      <button onclick="window.print()">Print / Save as PDF</button>

      <h1>${title}</h1>
      <h3>${subject}</h3>

      <div class="box">
        <h3>Learning Goal</h3>
        <p>${desc}</p>
      </div>

      <div class="box">
        <h3>Steps</h3>
        <ol>
          <li>Teacher explains the activity.</li>
          <li>Children collect the materials.</li>
          <li>Children cut, colour, paste, and decorate.</li>
          <li>Children share their work with the group.</li>
          <li>Teacher connects the activity to learning.</li>
        </ol>
      </div>

      <div class="box">
        <h3>Extension</h3>
        <p>Ask children to explain one thing they learned from the activity.</p>
      </div>
    </body>
    </html>
  `);

  win.document.close();
}
</script>

</body>
</html>
